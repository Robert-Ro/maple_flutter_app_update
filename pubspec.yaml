name: maple_app_update
description: A reusable Flutter app update library with Riverpod providers.
version: 1.0.0
homepage: https://github.com/your-org/maple_app_update

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_app_update: ^3.2.3
  package_info_plus: ^8.3.0
  url_launcher: ^6.3.1
  
  hooks_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  build_runner: ^2.5.4
  riverpod_generator: ^2.6.5
  freezed: ^3.1.0
  json_serializable: ^6.9.5
  flutter_lints: ^6.0.0